<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BCD4" />
      <stop offset="100%" stop-color="#0277BD" />
    </linearGradient>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A5D6A7" />
      <stop offset="100%" stop-color="#00BCD4" />
    </linearGradient>
  </defs>
  
  <!-- Stylized 2D House Outline (Blueprint style) -->
  <g stroke="url(#lineGradient)" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="8 8" opacity="0.8">
    <path d="M 50 200 L 50 120 L 120 60 L 190 120 L 190 200 Z" />
    <rect x="100" y="140" width="40" height="60" />
    <path d="M 30 130 L 120 50 L 210 130" />
  </g>

  <!-- Morphing Lines (Connecting 2D to 3D) -->
  <g stroke="#ffffff" stroke-width="2" stroke-dasharray="4 4" opacity="0.4">
    <line x1="120" y1="60" x2="250" y2="90" />
    <line x1="50" y1="200" x2="180" y2="230" />
    <line x1="190" y1="200" x2="320" y2="230" />
  </g>

  <!-- 3D Isometric Cube -->
  <g transform="translate(180, 80)">
    <!-- Top Face -->
    <path d="M 70 10 L 140 45 L 70 80 L 0 45 Z" fill="#4DD0E1" stroke="#00BCD4" stroke-width="2"/>
    <!-- Left Face -->
    <path d="M 0 45 L 70 80 L 70 150 L 0 115 Z" fill="url(#cubeGradient)" stroke="#00BCD4" stroke-width="2"/>
    <!-- Right Face -->
    <path d="M 70 80 L 140 45 L 140 115 L 70 150 Z" fill="#0288D1" stroke="#00BCD4" stroke-width="2"/>
  </g>
  
  <!-- Text Logo -->
  <text x="50" y="270" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" letter-spacing="2">
    Floor<tspan fill="#00BCD4">3D</tspan>
  </text>
</svg>
